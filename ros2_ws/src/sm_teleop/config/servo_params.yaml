# Override UR servo defaults for SpaceMouse teleoperation
# Base config comes from ur_moveit_config/config/ur_servo.yaml
# Only list overrides here
moveit_servo:
  command_in_type: "speed_units"
  incoming_command_timeout: 0.15
  publish_period: 0.008  # 125 Hz
  scale:
    linear: 0.3
    rotational: 0.5
    joint: 0.5
