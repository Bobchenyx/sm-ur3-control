# Teleop Configuration for SpaceMouse → UR3 Control

robot:
  ip: "192.168.0.2"          # UR3 IP address on LAN
  rtde_frequency: 125         # Hz, RTDE communication rate
  payload_kg: 0.5             # End-effector payload in kg

spacemouse:
  deadzone: 0.05              # Raw values below this are zeroed
  # Scale factors: m/s per unit (translation), rad/s per unit (rotation)
  translation_scale: [0.03, 0.03, 0.03]   # [x, y, z] - very low for initial testing
  rotation_scale: [0.05, 0.05, 0.05]       # [rx, ry, rz] - low for initial testing
  # Axis mapping: [spacemouse_axis, sign]
  # SpaceMouse axes don't always align with robot base frame
  # SpaceMouse: +x=right, +y=forward, +z=up (push down)
  # UR3 base:   +x=forward, +y=left, +z=up
  axis_map:
    x: { sm_axis: "y", sign: 1 }     # robot X ← SpaceMouse Y
    y: { sm_axis: "x", sign: -1 }    # robot Y ← -SpaceMouse X
    z: { sm_axis: "z", sign: -1 }    # robot Z ← -SpaceMouse Z (push up = up)
    rx: { sm_axis: "pitch", sign: 1 }
    ry: { sm_axis: "roll", sign: -1 }
    rz: { sm_axis: "yaw", sign: -1 }

safety:
  max_linear_speed: 0.05       # m/s - start low, increase when comfortable
  max_angular_speed: 0.10      # rad/s
  workspace_bounds:
    min: [-0.5, -0.5, 0.02]   # meters in robot base frame (z=0.02 above table)
    max: [0.5, 0.5, 0.5]

control:
  mode: "servoL"               # servoL (incremental position control via RTDE)
  loop_rate: 125               # Hz (servoL designed for high-frequency control)
  acceleration: 0.25           # m/s^2 for speedL
  deadman_button: 0            # SpaceMouse button index for dead-man switch

ros_bridge:
  host: "localhost"
  port: 9090
  twist_topic: "/servo_node/delta_twist_cmds"
  frame_id: "base_link"
